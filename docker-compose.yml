services:
  #FastAPI 
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis # A API só sobe depois que o Redis estiver pronto

  #Message Broker
  redis:
    image: redis:7-alpine 
    ports:
      - "6379:6379"

  worker:
    build: .
    command: celery -A tasks worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis # Worker só roda depois do Redis iniciar evitando falhas no celery.
